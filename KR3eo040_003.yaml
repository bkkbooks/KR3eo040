body:
  text: 卷第三米穀品稻米味甘苦平無毒主溫中令人多熱大便堅不可多食即糯米也蘇門者為上釀酒者多用粳米味甘苦平無毒主益氣止煩止泄和胃氣長肌肉即今有數種香粳米匾子米雪裡白香子米香味尤勝諸粳米搗碎取其圓淨者為圓米亦作渴米粟米味鹹微寒無毒主養腎氣去脾胃中熱益氣陳者良治胃中熱消渴利小便止痢唐本草注云粟類多種顆粒細如粱米搗細取勻淨者為浙米青粱米味甘微寒無毒主胃痹中熱消渴止泄痢益氣補中輕身延年白粱米味甘微寒無毒主除熱益氣黃粱米味甘平無毒主益氣和中止泄唐本注云穗大毛長穀米俱粗於白粱黍米味甘平無毒主益氣補中多熱令人煩久食昏人五臟令人好睡肺病宜食丹黍米味苦微溫無毒主咳逆霍亂止煩渴除熱稷米味甘無毒主益氣補不足關西謂之糜子米亦謂穄米古者取其香可愛故以供祭祀河西米味甘無毒補中益氣顆粒硬於諸米出本地緑豆味甘寒無毒主丹毒風疹煩熱和五臟行經脈白豆味甘平無毒調中暖腸胃助經脈腎病宜食大豆味甘平無毒殺鬼氣止痛逐水除胃中熱下瘀血解諸藥毒作豆腐即寒而動氣赤小豆味甘酸平無毒主下水排膿血去熱腫止瀉痢通小便解小麥毒回回豆子味甘無毒主消渴勿與鹽煮食之出在回回地面苗似豆今田野中處處有之青小豆味甘寒無毒主熱中消渴止下痢去腹脹産婦無乳汁爛煮三五升食之即乳多豌豆味甘平無毒調順榮衛和中益氣匾豆味甘微溫主和中葉主霍亂吐下不止小麥味甘微寒無毒主除熱止煩躁消渴咽乾利小便養肝氣止痛唾血大麥味鹹溫微寒無毒主消渴除熱益氣調中令人多熱為五穀長藥性論云能消化宿食破冷氣蕎麥味甘平寒無毒實腸胃益氣力久食動風氣令人頭眩和豬肉食之患熱風脫人鬚眉白芝麻味甘大寒無毒治虛勞滑腸胃行風氣通血脈去頭風潤肌膚食後生啖一合與乳母食之令子不生病胡麻味甘微寒除一切痼疾久服長肌肉健人油利大便治胞衣不下修真祕旨云神仙服胡麻法久服面光澤不飢三年水火不能害行及奔馬餳味甘微溫無毒補虛乏止渴去血健脾治嗽小兒誤吞錢取一斤漸漸盡食之即出蜜味甘平微溫無毒主心腹邪氣諸驚癇補五臟不足益中氣止痛解毒明耳目和百藥除衆病曲味甘大暖療藏府中風氣調中益氣開胃消食補虛去冷陳久者良醋味酸溫無毒消癰腫散水氣殺邪毒破血運除症塊堅積醋有數種酒醋桃醋麥醋葡萄醋棗醋米醋為上入藥用醬味鹹酸冷無毒除熱止煩殺百藥熱湯火毒殺一切魚肉菜蔬毒豆醬主治勝麵醬陳久者尤良豉味苦寒無毒主傷寒頭痛煩躁滿悶鹽味鹹溫無毒主殺鬼蠱邪疰毒傷寒吐胸中痰癖止心腹卒痛多食傷肺令人咳嗽失顏色酒味苦甘辣大熱有毒主行藥勢殺百邪通血脈厚腸胃潤皮膚消憂愁多飲損壽傷神易人本性酒有數般唯醞釀以隨其性虎骨酒以酥炙虎骨搗碎釀酒治骨節疼痛風疰冷痹痛枸杞酒以甘州枸杞依法釀酒補虛弱長肌肉益精氣去冷風壯陽道地黃酒以地黃絞汁釀酒治虛弱壯筋骨通血脈治腹內痛松節酒仙方以五月五日採松節銼碎煮水釀酒治冷風虛骨弱腳不能履地茯苓酒仙方依法茯苓釀酒治虛勞壯筋骨延年益壽松根酒以松樹下撅坑置甕取松根津液釀酒治風壯筋骨羊羔酒依法作酒大補益人五加皮酒五加皮浸酒或依法釀酒治骨弱不能行走久服壯筋骨延年不老膃肭臍酒治腎虛弱壯腰膝大補益人小黃米酒性熱不宜多飲昏人五臟煩熱多睡葡萄酒益氣調中耐飢強志酒有數等有西番者有哈剌火者有平陽太原者其味都不及哈剌火者田地酒最佳阿剌吉酒味甘辣大熱有大毒主消冷堅積去寒氣用好酒蒸熬取露成阿剌吉速兒麻酒又名撥糟味微甘辣主益氣止渴多飲令人膨脹生痰獸品牛肉味甘平無毒主消渴止啘泄安中益氣補脾胃牛髓補中填精髓牛酥涼益心肺止渴嗽潤毛髮除肺痿心熱吐血牛酪味甘酸寒無毒主熱毒止消渴除胸中虛熱身面熱瘡牛乳腐微寒潤五臟利大小便益十二經脈微動氣羊肉味甘大熱無毒主暖中頭風大風汗出虛勞寒冷補中益氣羊頭涼治骨蒸腦熱頭眩瘦病羊心主治憂恚膈氣羊肝性冷療肝氣虛熱目赤暗羊血主治女人中風血虛産後血暈悶欲絶者生飲一升羊五臟補人五臟羊腎補腎虛益精髓羊骨熱治虛勞寒中羸瘦羊髓味甘溫主治男女傷中陰氣不足利血脈益經氣羊腦不可多食羊酪治消渴補虛乏黃羊味甘溫無毒補中益氣治勞傷虛寒其種類數等成群至於千數白黃羊生於野草內黑尾黃羊生於沙漠中能走善臥行走不成群其腦不可食髓骨可食能補益人煮湯無味山羊味甘平無毒補益人生山谷中羖𦎐味甘平無毒補五勞七傷溫中益氣其肉稍腥馬肉味辛苦冷有小毒主熱下氣長筋骨強腰膝壯健輕身馬頭骨作枕令人少睡馬肝不可食馬蹄白者治婦人漏下白崩赤者治婦人赤崩白馬莖味鹹甘無毒主傷中脈絶強志益氣長肌肉令人有子能壯盛陰氣馬心主喜忘馬肉內有生黑墨汁者有毒不可食白馬多有之馬乳性冷味甘止渴治熱有三等一名升堅一名晃禾兒一名窗兀以升堅為上野馬肉味甘平有毒壯筋骨與家馬肉頗相似其肉落地不沾沙然不宜多食象肉味淡不堪食多食令人體重胸前小橫骨令人能浮水身有百獸肉皆有分段惟鼻是本肉象牙無毒主諸鐵及雜物入肉刮取屑細研和水傅瘡上即出駝肉治諸風下氣壯筋骨潤皮膚療一切頑麻風痹肌膚緊急惡瘡腫毒駝脂在兩峰內有積聚者酒服之良駝乳系愛剌性溫味甘補中益氣壯筋骨令人不飢野駝味甘溫平無毒治諸風下氣壯筋骨潤皮膚駝峰治虛勞風有冷積者用葡萄酒溫調峰子油服之良好酒亦可熊肉味甘無毒主風痹筋骨不仁若腹中有積聚寒熱羸瘦者不可食之終身不除熊白涼無毒治風補虛損殺勞蟲熊掌食之可御風寒此是八珍之數古人最重之十月勿食之損神驢肉味甘寒無毒治風狂憂愁不樂安心氣解心煩頭肉治多年消渴煮食之良烏驢者尤佳脂和烏梅作丸治久瘧野驢性味同比家驢鬃尾長骨骼大食之能治風眩麋肉味甘溫無毒益氣補中治腰腳無力不可與野雞肉及蝦生菜梅李果實同食令人病麋脂味辛溫無毒主癰腫惡瘡風痹四肢拘緩通血脈潤澤皮膚麋皮作靴能除腳氣鹿肉味甘溫無毒補中強五臟益氣鹿髓甘溫主男女傷中絶脈筋急咳逆以酒服之鹿頭主消渴夜夢見物鹿蹄主腳膝疼痛鹿腎主溫中補腎安五臟壯陽氣鹿茸味甘微溫無毒主漏下惡血寒熱驚癇益氣強志補虛羸壯筋骨鹿角微咸無毒主惡瘡癰腫逐邪氣除小腹血急痛腰脊痛及留血在陰中獐肉溫主補益五臟日華子云肉無毒八月至臘月食之勝羊肉十二月以後至七月食之動氣道家多食言無禁忌也犬肉味鹹溫無毒安五臟補絶傷益陽道補血脈厚腸胃實下焦填精髓黃色犬肉尤佳不與蒜同食必頓損人九月不宜食之令人損神犬四腳蹄煮飲之下乳汁豬肉味苦無毒主閉血脈弱筋骨虛肥人不可久食動風患金瘡者尤甚豬肚主補中益氣止渴豬腎冷和理腎氣通利膀胱豬四蹄小寒主傷撻諸敗瘡下乳野豬肉味苦無毒主補肌膚令人虛肥雌者肉更美冬月食橡子肉色赤補人五臟治腸風瀉血其肉味勝家豬江豬味甘平無毒然不宜多食動風氣令人體重獺肉味鹹平無毒治水氣脹滿療瘟疫病諸熱毒風咳嗽勞損不可與兔同食獺肝甘有毒治腸風下血及主疰病相染獺皮飾領袖則塵垢不著如風沙翳目以袖拭之即出又魚刺鯁喉中不出者取獺爪爬項下即出虎肉味鹹酸平無毒主噁心欲嘔益氣力食之入山虎見則畏闢三十六種魅虎眼睛主瘧疾辟惡止小兒熱驚虎骨主除邪惡氣殺鬼疰毒止驚悸主惡瘡鼠瘻頭骨尤良豹肉味酸平無毒安五臟補絶傷壯筋骨強志氣久食令人猛健忘性粗疏耐寒暑正月勿食之傷神唐本注云車駕鹵簿用豹尾取其威重為可貴也土豹腦子可治腰疼狍子味甘平無毒補益人麂肉味甘平無毒主五痔多食能動人痼疾麝肉無毒性溫似獐肉而腥食之不畏蛇毒狐肉溫有小毒日華子云性暖補虛勞治惡瘡疥犀牛肉味甘溫無毒主諸獸蛇蟲蠱毒闢瘴氣食之入山不迷其路犀角味苦鹹微寒無毒主百毒蠱疰邪鬼瘴氣殺鉤吻鴆羽蛇毒療傷寒瘟疫犀有數等山犀通天犀闢塵犀水犀鎮帷犀狼肉味鹹性熱無毒主補益五臟厚腸胃填精髓腹有冷積者宜食之味勝狐犬肉狼喉嗉皮熟成皮條勒頭去頭痛狼皮熟作番皮大暖狼尾馬胸堂前帶之辟邪令馬不驚狼牙帶之辟邪兔肉味辛平無毒補中益氣不宜多食損陽事絶血脈令人痿黃不可與薑橘同食令人患卒心痛妊娠不可食令子缺唇二月不可食傷神兔肝主明目臘月兔頭及皮毛燒灰酒調服之治難産胞衣不出余血不下塔剌不花一名土撥鼠味甘無毒主野雞瘻瘡煮食之宜人生山後草澤中北人掘取以食雖肥煮則無油湯無味多食難克化微動氣皮作番皮不濕透甚暖頭骨去下頦肉令齒全治小兒無睡懸之頭邊即令得睡獾肉味甘平無毒治上氣咳逆水脹不差作羹食良野貍味甘平無毒主治鼠瘻惡瘡頭骨尤良黃鼠味甘平無毒多食發瘡猴肉味酸無毒主治諸風勞疾釀酒尤佳禽品天鵝味甘性熱無毒主補中益氣鵝有三四等金頭鵝為上小金頭鵝為次有花鵝者有一等鵝不能鳴者飛則翎響其肉微腥皆不及金頭鵝鵝味甘平無毒利五臟主消渴孟詵云肉性冷不可多食亦發痼疾日華子云蒼鵝性冷有毒食之發瘡白鵝無毒解五臟熱止渴脂潤皮膚主治耳聾鵝彈補五臟益氣有痼疾者不宜多食雁味甘平無毒主風攣拘急偏枯氣不通利益氣壯筋骨補勞瘦雁骨灰和米泔洗頭長髮雁膏治耳聾亦能長髮雁脂補虛羸令人肥白六月七月勿食雁令人傷神䳄䳓味甘溫無毒補中益氣食之甚有益人炙食之味尤美然有數等白䳄䳓黑頭䳄䳓胡䳄䳓其肉皆不同髓味甘美補精髓水札味甘平無毒補中益氣宜炙食之甚美丹雄雞味甘平微溫無毒主婦人崩中漏下赤白補虛溫中止血白雄雞味酸無毒主下氣療狂邪補中安五臟治消渴烏雄雞味甘酸無毒主補中止痛除心腹惡氣虛弱者宜食之烏雌雞味甘溫無毒主風寒濕痹五緩六急中惡腹痛及傷折骨疼安胎血療乳難黃雌雞味酸平無毒主傷中消渴小便數不禁腸澼泄痢補五臟先患骨熱者不可食雞子益氣多食令人有聲主産後痢與小兒食之止痢日華子云雞子鎮心安五臟其白微寒療目赤熱痛除心下伏熱止煩滿咳逆野雞味甘酸微寒有小毒主補中益氣止泄痢久食令人瘦九月至十一月食之稍有益他月即發五痔及諸瘡亦不可與胡桃及菌子木耳同食山雞味甘溫有小毒主五臟氣喘不得息者如食法服之然久食能發五痔與蕎麥麵同食生蟲今遼陽有食雞味甚肥美有角雞味尤勝諸雞肉鴨肉味甘冷無毒補內虛消毒熱利水道及治小兒熱驚癇野鴨味甘微寒無毒補中益氣消食和胃氣治水腫緑頭者為上尖尾者為次鴛鴦味鹹平有小毒主治瘻瘡若夫婦不和者作羹私與食之即相愛鸂鶒味甘平無毒治驚邪鵓鴿味鹹平無毒調精益氣解諸毒藥鳩肉味甘平無毒安五藏益氣明目療癰腫排膿血鴇肉味甘平無毒補益人其肉粗味美寒鴉味酸鹹平無毒主瘦病止咳嗽骨蒸羸弱者鵪鶉味甘溫平無毒益氣補五臟實筋骨耐寒暑消結熱酥煎食之令人肥下焦四月以前未可食雀肉味甘無毒性熱壯陽道令人有子冬月者良蒿雀味甘