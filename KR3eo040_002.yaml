頭一枚撏洗淨胡椒二錢草果二錢上件煮令爛熟入豆豉汁中五味調和空腹食之驢肉湯治風狂憂愁不樂安心氣烏驢肉不以多少切上件於豆豉中爛煮熟入五味空心食之狐肉羹治驚風癲癇神情恍惚言語錯謬歌笑無度狐肉不以多少及五臟上件如常法入五味煮令爛熟空心食之熊肉羹治諸風腳氣痹痛不仁五緩筋急熊肉一斤上件於豆豉中入五味蔥醬煮熟空腹食之烏雞酒治中風背強舌直不得語目睛不轉煩熱烏雌雞一隻撏洗淨去腸肚上件以酒五升煮取酒二升去滓分作三服相繼服之汁盡無時熬蔥白生薑粥投之蓋覆取汁羊肚羹治諸中風羊肚一枚洗淨粳米二合蔥白數莖豉半合蜀椒去目閉口者炒出汗三十粒生薑二錢半細切右六味拌勻入羊肚內爛煮熟五味調和空心食之葛粉羹治中風心脾風熱言語蹇澀精神昏憒手足不遂葛根半斤搗取粉四兩荊芥穗一兩豉三合右三味先以水煮荊芥豉六七沸去滓取汁次將葛粉作索麵於汁中煮熟空腹食之荊芥粥治中風言語蹇澀精神昏憒口面喎斜荊芥穗一兩薄荷葉一兩豉三合白粟米三合上件以水四升煮取三升去滓下米煮粥空腹食之麻子粥治中風五臟風熱語言蹇澀手足不遂大腸滯澀冬麻子二兩炒去皮研白粟米三合薄荷葉一兩荊芥穗一兩上件水三升煮薄荷荊芥去滓取汁入麻子仁同煮粥空腹食之惡實菜即牛蒡子又名鼠黏子治中風燥熱口乾手足不遂及皮膚熱瘡惡實菜葉肥嫩者酥油上件以湯煮惡實葉三五升取出以新水淘過布絞取汁入五味酥點食之烏驢皮湯治中風手足不遂骨節煩疼心燥口眼面目喎斜烏驢皮一張撏洗淨上件蒸熟細切如條於豉汁中入五味調和勻煮過空心食之羊頭膾治中風頭眩羸瘦手足無力白羊頭一枚撏洗淨上件蒸令爛熟細切以五味汁調和膾空腹食之野豬臛治久痔野雞病下血不止肛門腫滿野豬肉二斤細切上件煮令爛熟入五味空心食之獺肝羹治久痔下血不止獺肝一副上件煮熟入五味空腹食之鯽魚羹治久痔腸風大便常有血大鯽魚一頭新鮮者洗淨切作片小椒二錢為末草果一錢為末上件用蔥三莖煮熟入五味空腹食之服藥食忌但服藥不可多食生芫荽及蒜雜生菜諸滑物肥豬肉犬肉油膩物魚膾腥膻等物及忌見喪屍產婦淹穢之事又不可食陳臭之物有術勿食桃李雀肉胡荽蒜青魚等物有黎蘆勿食猩肉有巴豆勿食蘆筍及野豬肉有黃連桔梗勿食豬肉有地黃勿食蕪荑有半夏菖蒲勿食飴糖及羊肉有細辛勿食生菜有甘草勿食菘菜海藻有牡丹勿食生胡荽有商陸勿食犬肉有常山勿食生蔥生菜有空青硃砂勿食血凡服藥通忌食血有茯苓勿食醋有鱉甲勿食莧菜有天門冬勿食鯉魚凡久服藥通忌未不服藥又忌滿日正五九月忌巳日二六十月忌寅日三七十一月忌亥日四八十二月忌申日食物利害蓋食物有利害者可知而避之面有𦤡氣不可食生料色臭不可食漿老而飯餿不可食煮肉不變色不可食諸肉非宰殺者勿食諸肉臭敗者不可食諸腦不可食凡祭肉自動者不可食豬羊疫死者不可食曝肉不幹者不可食馬肝牛肝皆不可食兔閤眼不可食燒肉不可用桑柴火獐鹿麋四月至七月勿食二月內勿食兔肉諸肉脯忌米中貯之有毒魚餒者不可食羊肝有孔者不可食諸鳥自閉口者勿食蟹八月後可食余月勿食蝦不可多食無須及腹下丹煮之白者皆不可食臘月脯臘之屬或經雨漏所漬蟲鼠齧殘者勿食海味糟藏之屬或經濕熱變損日月過久者勿食六月七月勿食雁鯉魚頭不可食毒在腦中諸肝青者不可食五月勿食鹿傷神九月勿食犬肉傷神十月勿食熊肉傷神不時者不可食諸果核未成者不可食諸果落地者不可食諸果蟲傷者不可食桃杏雙仁者不可食蓮子不去心食之成霍亂甜瓜雙蒂者不可食諸瓜沉水者不可食蘑菇勿多食發病榆仁不可多食令人瞑菜著霜者不可食櫻桃勿多食令人發風蔥不可多食令人虛芫荽勿多食令人多忘竹筍勿多食發病木耳色赤者不可食三月勿食蒜昏人目二月勿食蓼發病九月勿食著霜瓜四月勿食胡荽生狐臭十月勿食椒傷人心五月勿食韭昏人五臟食物相反蓋食不欲雜雜則或有所犯知者分而避之馬肉不可與倉米同食馬肉不可與蒼耳姜同食豬肉不可與牛肉同食羊肝不可與椒同食傷心兔肉不可與姜同食成霍亂羊肝不可與豬肉同食牛肉不可與栗子同食羊肚不可與小豆梅子同食傷人羊肉不可與魚膾酪同食豬肉不可與芫荽同食爛人腸馬奶子不可與魚膾同食生癥瘕鹿肉不可與鮠魚同食麋鹿不可與蝦同食麋肉脂不可與梅李同食牛肝不可與鮎魚同食生風牛腸不可與犬肉同食雞肉不可與魚汁同食生癥瘕鵪鶉肉不可與豬肉同食面生黑鵪鶉肉不可與菌子同食發痔野雞不可與蕎麵同食生蟲野雞不可與胡桃蘑菇同食野雞卵不可與蔥同食生蟲雀肉不可與李同食雞子不可與鱉肉同食雞子不可與生蔥蒜同食損氣雞肉不可與兔肉同食令人泄瀉野雞不可與鯽魚同食鴨肉不可與鱉肉同食野雞不可與豬肝同食鯉魚不可與犬肉同食野雞不可與鮎魚同食食之令人生癩疾鯽魚不可與糖同食鯽魚不可與豬肉同食黃魚不可與蕎麵同食蝦不可與豬肉同食損精蝦不可與糖同食蝦不可與雞肉同食大豆黃不可與豬肉同食黍米不可與葵菜同食發病小豆不可與鯉魚同食楊梅不可與生蔥同食柿梨不可與蟹同食李子不可與雞子同食棗不可與蜜同食李子菱角不可與蜜同食葵菜不可與糖同食生蔥不可與蜜同食萵苣不可與酪同食竹筍不可與糖同食蓼不可與魚膾同食莧菜不可與鱉肉同食韭不可與酒同食苦苣不可與蜜同食薤不可與牛肉同食生癥瘕芥末不可與兔肉同食生瘡食物中毒諸物品類有根性本毒者有無毒而食物成毒者有雜合相畏相惡相反成毒者人不戒慎而食之致傷腑臟和乳腸胃之氣或輕或重各隨其毒而為害隨毒而解之如飲食後不知記何物毒心煩滿悶者急煎苦參汁飲令吐出或煮犀角汁飲之或苦酒好酒煮飲皆良食菜物中毒取雞糞燒灰水調服之或甘草汁或煮葛根汁飲之胡粉水調服亦可食瓜過多腹脹食鹽即消食蘑菇菌子毒地漿解之食菱角過多腹脹滿悶可暖酒和姜飲之即消食野山芋毒土漿解之食瓠中毒煮黍穰汁飲之即解食諸雜肉毒及馬肝漏脯中毒者燒豬骨灰調服或芫荽汁飲之或生韭汁亦可食牛羊肉中毒煎甘草汁飲之食馬肉中毒嚼杏仁即消或蘆根汁及好酒皆可食犬肉不消成䐜脹口乾杏仁去皮尖水煎飲之食魚膾過多成蟲瘕大黃汁陳皮末同鹽湯服之食蟹中毒飲紫蘇汁或冬瓜汁或生藕汁解之干蒜汁蘆根汁亦可食魚中毒陳皮汁蘆根及大黃大豆朴硝汁皆可食鴨子中毒煮秫米汁解之食雞子中毒可飲醇酒醋解之飲酒大醉不解大豆汁葛花椹子柑子皮汁皆可食牛肉中毒豬脂煉油一兩每服一匙頭溫水調下即解食豬肉中毒飲大黃汁或杏仁汁朴硝汁皆可解禽獸變異禽獸形類依本體生者猶分其性質有毒無毒者況異像變生豈無毒乎倘不慎口致生疾病是不察矣獸岐尾馬蹄夜目羊心有孔肝有青黑鹿豹文羊肝有孔黑雞白首白馬青蹄羊獨角白羊黑頭黑羊白頭白鳥黃首羊六角白馬黑頭雞有四距爆肉不燥馬生角牛肝葉孤蟹有獨螯魚有眼睫蝦無須肉入水動肉經宿暖魚無腸膽腮肉落地不沾土魚目開合及腹下丹
